<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOWZ 사용설명서 · Safari</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --ink:#1B1E25;--sub:#6B7280;--sub2:#9AA0A8;--line:#ECEEF1;--soft:#F6F7F9;
    --blue:#1CA7F0;--blue-d:#1391D6;--blue-wash:#E7F4FD;--red:#E5342B;
    --side:#1F2430;--side-line:#2C3340;--side-txt:#C4CAD4;
    --sans:'Pretendard',-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:#C9CDD4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
  .browser{position:relative;width:375px;height:812px;background:#fff;border-radius:44px;box-shadow:0 40px 80px rgba(0,0,0,.30),inset 0 0 0 2px rgba(0,0,0,.04);overflow:hidden;display:flex;flex-direction:column;}

  /* iOS 상태바 */
  .statusbar{flex:0 0 auto;height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 5px;font-size:15px;font-weight:600;color:#000;}
  .statusbar .ic{display:flex;gap:6px;align-items:center;}

  /* Safari 상단 주소창 */
  .sbar-top{flex:0 0 auto;padding:6px 12px 11px;border-bottom:1px solid #E4E6EA;background:#fff;}
  .urlpill{display:flex;align-items:center;gap:8px;background:#ECECEE;border-radius:13px;height:42px;padding:0 14px;}
  .urlpill .lock{color:#6B7280;}
  .urlpill .url{flex:1;text-align:center;font-size:16px;color:#1B1E25;letter-spacing:-.2px;}
  .urlpill .url .host{color:#6B7280;}
  .urlpill .share{color:#6B7280;}

  /* 웹뷰(콘텐츠 영역) */
  .webview{flex:1 1 auto;position:relative;overflow:hidden;background:#fff;}
  .page{position:absolute;inset:0;display:flex;flex-direction:column;}
  .pghead{flex:0 0 auto;height:50px;display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--line);background:#fff;}
  .pghead .ham{width:30px;height:30px;display:grid;place-items:center;cursor:pointer;}
  .pghead .ttl{font-size:16px;font-weight:800;display:flex;align-items:center;gap:7px;}
  .pghead .ttl .lg{color:var(--blue);font-weight:900;}
  .pghead .tag{margin-left:auto;font-size:11px;font-weight:700;color:var(--blue-d);background:var(--blue-wash);padding:5px 9px;border-radius:7px;}

  .pgbody{flex:1 1 auto;overflow-y:auto;padding:18px 20px 28px;}
  .pgbody::-webkit-scrollbar{width:0;}

  .crumb{font-size:12px;color:var(--sub2);margin-bottom:12px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
  .crumb b{color:var(--blue-d);font-weight:700;}.crumb .sep{color:#D5D9DE;}
  .pgbody h1{font-size:23px;font-weight:800;letter-spacing:-.4px;line-height:1.3;}
  .pgbody h1 .hn{color:var(--blue);}
  .pgbody h2.t{font-size:21px;font-weight:800;}
  .lead{font-size:14.5px;line-height:1.72;color:#454B54;margin-top:14px;}
  .lead + .lead{margin-top:9px;}
  .tip{display:inline-flex;align-items:flex-start;gap:6px;font-size:12.5px;font-weight:700;color:#C9781A;background:#FFF3E2;border-radius:9px;padding:8px 11px;margin-top:13px;line-height:1.5;}

  .figure{background:var(--soft);border-radius:16px;padding:18px 16px;margin:20px 0;display:flex;justify-content:center;}
  .shot{position:relative;display:inline-block;}
  .pm{width:202px;border:7px solid #15171C;border-radius:28px;overflow:hidden;background:var(--soft);box-shadow:0 12px 28px rgba(20,24,33,.16);}
  .pm-bar{height:20px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:8.5px;font-weight:700;color:var(--ink);background:var(--soft);}
  .pm-body{padding:9px 10px 13px;min-height:292px;position:relative;}
  .pm-h{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;padding:3px 1px 9px;}
  .pm-h .bk{color:#9AA0A8;font-weight:800;}.pm-h .sp{margin-left:auto;display:flex;gap:6px;color:#9AA0A8;}
  .pm-tabs{display:flex;background:#EDEFF2;border-radius:8px;padding:3px;margin-bottom:8px;font-size:10px;font-weight:700;}
  .pm-tabs span{flex:1;text-align:center;padding:5px;border-radius:6px;color:#8B919A;}
  .pm-tabs span.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .pm-card{background:#fff;border:1px solid #ECEEF1;border-radius:10px;padding:8px 9px;margin-bottom:7px;}
  .pm-row{display:flex;align-items:center;gap:6px;font-size:10.5px;}.pm-row + .pm-row{margin-top:7px;}
  .pm-pill{font-size:8px;font-weight:800;padding:3px 6px;border-radius:5px;}
  .pm-coin{width:13px;height:13px;border-radius:50%;display:grid;place-items:center;font-size:6.5px;font-weight:800;color:#fff;}
  .pm-mut{color:#9AA0A8;}.pm-strong{font-weight:700;}
  .pm-date{display:flex;align-items:center;justify-content:center;gap:9px;font-size:11px;font-weight:800;margin-bottom:8px;}
  .pm-date .nav{color:#B7BCC4;}
  .pm-btn{height:28px;border-radius:8px;background:var(--blue);color:#fff;font-size:10.5px;font-weight:800;display:grid;place-items:center;}
  .pm-fab{position:absolute;right:12px;bottom:12px;width:32px;height:32px;border-radius:50%;background:var(--blue);display:grid;place-items:center;color:#fff;font-size:17px;font-weight:300;box-shadow:0 5px 12px rgba(28,167,240,.5);}
  .pm-tl .h{font-size:8px;color:#B7BCC4;width:22px;flex:0 0 22px;text-align:right;padding-top:2px;}
  .pm-tl .blk{flex:1;border-radius:5px;padding:4px 6px;font-size:9px;font-weight:700;color:#fff;margin-bottom:4px;}
  .pm-input{display:flex;align-items:center;gap:6px;border:1px solid #E7E9ED;border-radius:16px;padding:6px 9px;font-size:10px;color:#9AA0A8;background:#fff;}

  .callout{position:absolute;width:21px;height:21px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center;box-shadow:0 2px 6px rgba(0,0,0,.35);transform:translate(-50%,-50%);z-index:4;border:2px solid #fff;}

  .note{background:var(--soft);border-radius:13px;padding:15px 16px;margin:18px 0;}
  .note h4{font-size:13.5px;font-weight:800;color:#3A3F47;margin-bottom:9px;display:flex;align-items:center;gap:6px;}
  .note h4 .i{width:17px;height:17px;border-radius:50%;background:#6B7280;color:#fff;display:grid;place-items:center;font-size:10px;font-weight:800;}
  .note ol{margin-left:17px;}
  .note li{font-size:13px;color:#4A4F59;line-height:1.65;margin-bottom:5px;}.note li b{color:var(--ink);}
  .pillrow{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0;}
  .pillrow .pl{font-size:11.5px;font-weight:700;padding:6px 10px;border-radius:8px;background:var(--soft);color:#5A606A;display:inline-flex;align-items:center;gap:5px;}
  .pillrow .pl .d{width:6px;height:6px;border-radius:50%;}

  .prevnext{display:flex;gap:9px;margin-top:26px;padding-top:18px;border-top:1px solid var(--line);}
  .pn{flex:1;border:1px solid var(--line);border-radius:11px;padding:11px 13px;cursor:pointer;background:#fff;min-width:0;}
  .pn.next{text-align:right;}
  .pn .k{font-size:11px;color:var(--sub2);font-weight:700;}
  .pn .t{font-size:13px;font-weight:700;color:var(--ink);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pn.empty{visibility:hidden;}

  /* 좌측 사이드바(드로어) */
  .drawerwrap{position:absolute;inset:0;z-index:20;display:none;}
  .drawerwrap.open{display:flex;}
  .drawer{width:286px;background:var(--side);color:var(--side-txt);overflow-y:auto;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);}
  .drawerwrap.open .drawer{transform:translateX(0);}
  .drawer::-webkit-scrollbar{width:0;}
  .scrim{flex:1;background:rgba(8,10,14,.5);opacity:0;transition:opacity .26s;}
  .drawerwrap.open .scrim{opacity:1;}
  .side-head{padding:18px 20px 14px;border-bottom:1px solid var(--side-line);}
  .side-head .t{font-size:15px;font-weight:800;color:#fff;}
  .side-head .s{font-size:12px;color:#8C94A2;margin-top:3px;}
  .nav{padding:6px 0 30px;}
  .grp{border-bottom:1px solid rgba(255,255,255,.04);}
  .ghead{display:flex;align-items:center;gap:10px;padding:13px 18px;cursor:pointer;font-size:14.5px;font-weight:700;color:#E4E8EE;}
  .ghead .num{flex:0 0 22px;height:22px;border-radius:6px;background:rgba(255,255,255,.09);display:grid;place-items:center;font-size:11px;font-weight:800;color:#AEB6C2;}
  .grp.open .ghead .num,.ghead.leaf .num{background:var(--blue);color:#fff;}
  .ghead .cv{margin-left:auto;color:#7A8392;transition:transform .2s;}
  .grp.open .ghead .cv{transform:rotate(90deg);}
  .ghead.leaf .cv{display:none;}
  .subs{display:none;padding-bottom:6px;}
  .grp.open .subs{display:block;}
  .sub{display:block;padding:9px 18px 9px 50px;font-size:13.5px;color:#A8AFBB;cursor:pointer;border-left:3px solid transparent;}
  .sub.active{color:#fff;background:rgba(28,167,240,.12);border-left-color:var(--blue);font-weight:700;}
  .ghead.leaf.active,.ghead.active{box-shadow:inset 3px 0 0 var(--blue);background:rgba(28,167,240,.10);}

  /* Safari 하단 툴바 */
  .sbar-bottom{flex:0 0 auto;height:60px;display:flex;align-items:center;justify-content:space-around;padding:0 22px;border-top:1px solid #E4E6EA;background:#F7F7F8;color:#3A3F47;}
  .sbar-bottom .b{width:34px;height:34px;display:grid;place-items:center;cursor:pointer;}
  .sbar-bottom .plus{width:38px;height:38px;border-radius:50%;background:#E6E6E8;display:grid;place-items:center;}
  .sbar-bottom .tabs{position:relative;width:26px;height:26px;border:2px solid #6B7280;border-radius:7px;display:grid;place-items:center;font-size:12px;font-weight:700;color:#6B7280;}
  .home-ind{flex:0 0 auto;height:22px;display:flex;align-items:center;justify-content:center;background:#F7F7F8;}
  .home-ind i{width:128px;height:5px;border-radius:99px;background:#000;display:block;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="browser">
  <div class="statusbar"><span>9:41</span><span class="ic">
    <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#000"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1" fill="#000"/><rect x="9" y="2" width="3" height="10" rx="1" fill="#000"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#000"/></svg>
    <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2.2c2.3 0 4.4.9 6 2.4l-1.4 1.5A6.6 6.6 0 0 0 8.5 4.3 6.6 6.6 0 0 0 3.9 6.1L2.5 4.6A8.6 8.6 0 0 1 8.5 2.2Z" fill="#000"/><circle cx="8.5" cy="10.4" r="1.4" fill="#000"/></svg>
    <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3.2" fill="none" stroke="#000" stroke-opacity=".4"/><rect x="2.6" y="2.6" width="18" height="7.8" rx="1.8" fill="#000"/><rect x="23.5" y="4" width="1.6" height="5" rx=".8" fill="#000" fill-opacity=".4"/></svg>
  </span></div>

  <!-- Safari 주소창 -->
  <div class="sbar-top">
    <div class="urlpill">
      <svg class="lock" width="13" height="15" viewBox="0 0 13 15"><rect x="1.5" y="6" width="10" height="8" rx="2" fill="#6B7280"/><path d="M3.5 6V4.2a3 3 0 0 1 6 0V6" stroke="#6B7280" stroke-width="1.4" fill="none"/></svg>
      <span class="url">guide.nowz.app</span>
      <svg class="share" width="17" height="20" viewBox="0 0 17 20"><path d="M8.5 2v10M5 5l3.5-3.5L12 5" stroke="#6B7280" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 8H3v9h11V8h-1" stroke="#6B7280" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
    </div>
  </div>

  <!-- 웹뷰 -->
  <div class="webview">
    <div class="page">
      <div class="pghead"><span class="ham" id="ham"><svg width="20" height="20" viewBox="0 0 20 20"><path d="M3 5h14M3 10h14M3 15h14" stroke="#1B1E25" stroke-width="1.8" stroke-linecap="round"/></svg></span><span class="ttl"><span class="lg">NOWZ</span> 사용설명서</span><span class="tag">학생용</span></div>
      <div class="pgbody" id="pgbody"></div>
    </div>

    <div class="drawerwrap" id="drawerwrap">
      <aside class="drawer" id="drawer">
        <div class="side-head"><div class="t">학생용 가이드</div><div class="s">생활·학습 관리 앱 사용방법</div></div>
        <nav class="nav" id="nav"></nav>
      </aside>
      <div class="scrim" id="scrim"></div>
    </div>
  </div>

  <!-- Safari 하단 툴바 -->
  <div class="sbar-bottom">
    <div class="b"><svg width="20" height="20" viewBox="0 0 22 22"><path d="M14 4l-8 7 8 7" stroke="#A0A4AB" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="b"><svg width="20" height="20" viewBox="0 0 22 22"><path d="M8 4l8 7-8 7" stroke="#A0A4AB" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="b plus"><svg width="20" height="20" viewBox="0 0 22 22"><path d="M11 4v14M4 11h14" stroke="#3A3F47" stroke-width="2" stroke-linecap="round"/></svg></div>
    <div class="b"><span class="tabs">4</span></div>
    <div class="b"><svg width="22" height="22" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.8" fill="#3A3F47"/><circle cx="12" cy="12" r="1.8" fill="#3A3F47"/><circle cx="19" cy="12" r="1.8" fill="#3A3F47"/></svg></div>
  </div>
  <div class="home-ind"><i></i></div>
</div>

<script>
function bar(){return `<div class="pm-bar"><span>9:41</span><span>📶 ⚡</span></div>`;}
function phone(body,callouts){
  const cos=(callouts||[]).map(c=>`<div class="callout" style="left:${c.x}%;top:${c.y}%">${c.n}</div>`).join('');
  return `<div class="figure"><div class="shot"><div class="pm">${bar()}<div class="pm-body">${body}</div></div>${cos}</div></div>`;
}
function note(items){return `<div class="note"><h4><span class="i">!</span>참고</h4><ol>${items.map(i=>`<li>${i}</li>`).join('')}</ol></div>`;}

const PAGES={
 'home':{c:['1. 홈화면'],h:'<span class="hn">1.</span> 홈화면',body:`
   <p class="lead">홈은 앱을 열었을 때 가장 먼저 보이는 화면입니다. 오늘의 <b>알림</b>, <b>날짜 이동</b>, 오늘 해야 할 <b>미션 인증</b>을 한 곳에서 확인하고 바로 실행할 수 있어요.</p>
   <p class="lead">학생 유형(<b>CP</b> / <b>RP</b>)에 따라 홈 구성이 조금씩 달라집니다.</p>`},
 'home-layout':{c:['1. 홈화면','화면 구성'],h:'화면 구성',sub:true,body:`
   <p class="lead">홈 상단의 알림·날짜 이동, 본문의 미션 인증 카드로 이루어져 있습니다.</p>
   ${phone(`
     <div class="pm-h">오늘 미션 <span class="sp">🔔</span></div>
     <div class="pm-date"><span class="nav">‹</span> 2026.09.26 (금) <span class="nav">›</span></div>
     <div class="pm-tabs"><span class="on">생활</span><span>학습</span></div>
     <div class="pm-card"><div class="pm-row"><span class="pm-strong">이부자리 정리</span><span class="pm-pill" style="background:#FDECEA;color:#D64A40;margin-left:auto">미인증</span></div><div class="pm-row"><span class="pm-coin" style="background:#F5C84B">₩</span><span class="pm-mut">500원</span><div class="pm-btn" style="margin-left:auto;width:54px">인증</div></div></div>
     <div class="pm-card"><div class="pm-row"><span class="pm-strong">독서 30p</span><span class="pm-pill" style="background:#E7F4FD;color:#1391D6;margin-left:auto">검토중</span></div></div>
   `,[{n:1,x:88,y:11},{n:2,x:50,y:21},{n:3,x:80,y:55}])}
   ${note(['<b>알림</b>: 우측 상단 종 아이콘에서 매니저 코멘트, 승인/반려, 보상 지급 등 최신 알림을 확인합니다.','<b>날짜 이동</b>: 상단 날짜의 좌우 화살표로 다른 날짜의 미션을 조회합니다.','<b>미션 인증</b>: 각 카드의 <b>인증</b> 버튼으로 사진·시간 인증을 제출합니다. 상태가 미인증 → 검토중 → 완료로 바뀝니다.'])}`},
 'home-cp':{c:['1. 홈화면','CP 학생'],h:'CP 학생 홈',sub:true,body:`<p class="lead">CP(집중 관리형) 학생의 홈은 <b>매니저가 배정한 미션 중심</b>입니다. 정해진 루틴을 따라 인증만 하면 되도록 단순하게 보여줍니다.</p><div class="tip">⚠ CP/RP 구분 기준은 실제 정책에 맞춰 확정해 주세요.</div>${note(['배정된 미션이 상단에 먼저 노출됩니다.','승인이 필요한 항목이 우선 정렬됩니다.'])}`},
 'home-rp':{c:['1. 홈화면','RP 학생'],h:'RP 학생 홈',sub:true,body:`<p class="lead">RP(자기주도형) 학생의 홈은 <b>스스로 세운 계획 중심</b>입니다. 직접 만든 목표·플래너가 먼저 보이고 인증도 주도적으로 등록합니다.</p><div class="tip">⚠ CP/RP 구분 기준은 실제 정책에 맞춰 확정해 주세요.</div>${note(['내가 등록한 목표·플래너가 상단에 노출됩니다.','미션 추가(+)로 스스로 항목을 만들 수 있습니다.'])}`},
 'planner':{c:['2. 플래너 작성'],h:'<span class="hn">2.</span> 플래너 작성',body:`
   <p class="lead">하루 일정을 시간표 형태로 작성하는 화면입니다. 학습·프로그램·시험·일정을 시간 블록으로 배치해 하루를 계획합니다.</p>
   ${phone(`
     <div class="pm-h"><span class="bk">‹</span> 플래너 <span class="sp">📋</span></div>
     <div class="pm-date"><span class="nav">‹</span> 9월 26일 (금) <span class="nav">›</span></div>
     <div class="pm-tl">
       <div style="display:flex;gap:7px"><span class="h">09</span><div class="blk" style="background:#F2645A">국어 비문학</div></div>
       <div style="display:flex;gap:7px"><span class="h">11</span><div class="blk" style="background:#1CA7F0">SAT 정규반</div></div>
       <div style="display:flex;gap:7px"><span class="h">14</span><div class="blk" style="background:#F39C5B">모의고사</div></div>
       <div style="display:flex;gap:7px"><span class="h">19</span><div class="blk" style="background:#8B5CF6">상담</div></div>
     </div>
     <div class="pm-fab">+</div>
   `,[{n:1,x:50,y:20},{n:2,x:58,y:40},{n:3,x:87,y:90}])}

 {id:'chat',num:'5',title:'채팅',children:[['chat-layout','화면 구성'],['chat-delete','대화 내용 삭제'],['chat-search','대화 내용 검색'],['chat-library','라이브러리']]},
 {id:'report',num:'6',title:'리포트',children:[['report-weekly','주간 리포트'],['report-monthly','월간 리포트']]},
 {id:'mypage',num:'7',title:'마이페이지',children:[['mypage-profile','프로필 수정'],['mypage-zpt','ZPT 내역'],['mypage-benefit','혜택 및 패널티'],['mypage-feedback','피드백 몰아보기'],['mypage-service','서비스'],['mypage-setting','설정'],['mypage-logout','로그아웃'],['mypage-withdraw','회원탈퇴']]},
 {id:'return',num:'8',title:'귀가검사',children:[]},
];
const ORDER=[]; NAV.forEach(g=>{ORDER.push(g.id); g.children.forEach(([c])=>ORDER.push(c));});

const navEl=document.getElementById('nav'), pgbody=document.getElementById('pgbody');
const drawerwrap=document.getElementById('drawerwrap');
function buildNav(){
  navEl.innerHTML=NAV.map(g=>{
    const leaf=g.children.length===0;
    const subs=g.children.map(([cid,ct])=>`<a class="sub" data-id="${cid}">${ct}</a>`).join('');
    return `<div class="grp" data-gid="${g.id}"><div class="ghead ${leaf?'leaf':''}" data-id="${g.id}"><span class="num">${g.num}</span>${g.title}<svg class="cv" width="8" height="13" viewBox="0 0 8 13"><path d="M1.5 1l5 5.5-5 5.5" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="subs">${subs}</div></div>`;
  }).join('');
  navEl.querySelectorAll('.ghead').forEach(h=>h.onclick=()=>{
    const grp=h.closest('.grp');
    if(h.classList.contains('leaf')) go(h.dataset.id);
    else { grp.classList.toggle('open'); go(h.dataset.id); }
  });
  navEl.querySelectorAll('.sub').forEach(s=>s.onclick=()=>go(s.dataset.id));
}
function setActive(id){
  navEl.querySelectorAll('.ghead,.sub').forEach(e=>e.classList.remove('active'));
  const el=navEl.querySelector(`[data-id="${id}"]`); if(el) el.classList.add('active');
  const parent=NAV.find(g=>g.id===id||g.children.some(([c])=>c===id));
  if(parent){ const grp=navEl.querySelector(`.grp[data-gid="${parent.id}"]`); if(grp) grp.classList.add('open'); }
}
function go(id){
  const p=PAGES[id]; if(!p) return;
  const crumb=`<span>학생용 가이드</span> ${p.c.map(x=>`<span class="sep">»</span> <b>${x}</b>`).join(' ')}`;
  const i=ORDER.indexOf(id), prev=ORDER[i-1], next=ORDER[i+1];
  const tt=x=>{const pg=PAGES[x];return pg?pg.c[pg.c.length-1]:'';};
  const pn=`<div class="prevnext">${prev?`<div class="pn prev" data-id="${prev}"><div class="k">‹ 이전</div><div class="t">${tt(prev)}</div></div>`:`<span class="pn empty"></span>`}${next?`<div class="pn next" data-id="${next}"><div class="k">다음 ›</div><div class="t">${tt(next)}</div></div>`:`<span class="pn empty"></span>`}</div>`;
  pgbody.innerHTML=`<div class="crumb">${crumb}</div>${p.sub?`<h2 class="t">${p.h}</h2>`:`<h1>${p.h}</h1>`}${p.body}${pn}`;
  pgbody.querySelectorAll('.pn[data-id]').forEach(b=>b.onclick=()=>go(b.dataset.id));
  setActive(id); pgbody.scrollTop=0; closeDrawer();
}
function openDrawer(){ drawerwrap.classList.add('open'); }
function closeDrawer(){ drawerwrap.classList.remove('open'); }
document.getElementById('ham').onclick=openDrawer;
document.getElementById('scrim').onclick=closeDrawer;

buildNav(); go('home');
</script>
</body>
</html>
